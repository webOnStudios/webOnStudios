    <main class="container mt-5">
        <h1 class="text-center mb-4">Publicar Nuevo Producto</h1>
        <form>
            <div class="form-group row">
                <label for="productName" class="col-sm-2 col-form-label">Nombre del Producto *</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="productName" placeholder="Nombre del Producto">
                </div>
            </div>
            <div class="form-group row">
                <label for="productCategory" class="col-sm-2 col-form-label">Categoría *</label>
                <div class="col-sm-10">
                    <select class="form-control" id="productCategory">
                        <option>Escoge una categoría</option>
                        <option>Electrónica</option>
                        <option>Hogar y cocina</option>
                        <option>Moda y ropa</option>
                        <option>Juguetes y Juegos</option>
                        <option>Deportes</option>
                        <option>Salud y Belleza</option>
                        <option>Libros y medios</option>
                        <option>Automóviles</option>
                        <option>Mascotas</option>
                        <option>Alimentos y bebidas</option>
                        <option>Otros</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label for="productPrice" class="col-sm-2 col-form-label">Precio *</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" id="productPrice" placeholder="Precio">
                </div>
            </div>
            <div class="form-group row">
                <label for="productStock" class="col-sm-2 col-form-label">Stock *</label>
                <div class="col-sm-10">
                    <input type="number" class="form-control" id="productStock" placeholder="Stock disponible">
                </div>
            </div>
            <div class="form-group row">
                <label for="productDescription" class="col-sm-2 col-form-label">Descripción *</label>
                <div class="col-sm-10">
                    <textarea class="form-control" id="productDescription" rows="4" placeholder="Descripción del producto" maxlength="150"></textarea>
                </div>
            </div>
            <div class="form-group row">
                <label for="productImages" class="col-sm-2 col-form-label">Imágenes *</label>
                <div class="col-sm-10">
                    <input type="file" class="form-control-file" id="productImages" multiple>
                </div>
            </div>
            <div class="form-group row">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-primary btn-block" id="publicar">Publicar Producto</button>
                </div>
            </div>
        </form>
